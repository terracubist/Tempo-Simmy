<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Tempo Simmy</title>
    <link rel="icon" href="./images/favicon.png">
    <!-- <link rel="icon" type="image/x-icon" href="/images/favicon.ico">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous"> -->
</head>

<body>
    <section>
        <div class="container">
            <div id="display"></div>

            <!-- <table contenteditable="true">
              <tr>
                <td>Editable 1</td>
                <td>Editable 2</td>
              </tr>
            </table> -->

            <h1>Tempo Simmy</h1>
            <p>Monte Carlo simulation of lobby dynamics, using per-round strength and matchmaking</p>
            
            <div class="tab">
              <button class="tablinks" onclick="openTab(event, 'Simulate')" id="defaultOpen">Simulate</button>
              <button class="tablinks" onclick="openTab(event, 'Simulation Settings')">Simulation Settings</button>
              <button class="tablinks" onclick="openTab(event, 'Player Profiles')">Player Profiles</button>
              <button class="tablinks" onclick="openTab(event, 'Import/Export')">Import/Export</button>
              <button class="tablinks" onclick="openTab(event, 'Changelog')">Changelog</button>
              <button class="tablinks" onclick="openTab(event, 'About')">About</button>
            </div>
            
            <div id="Simulate" class="tabcontent">
              <!-- <h3>Run and visualize</h3> -->
              <!-- <p>placeholder text</p> -->
              <div id="load-status">Loading simulation environment...</div>
            </div>
            
            <div id="Simulation Settings" class="sim-tab tabcontent">
              <!-- <h3>Settings</h3> -->
              <!-- <div id="sim-header">Configure simulation here</div> -->

              <div class="left-column">
                  <!-- Num sims -->
                  <div class="dropdown-container">
                      <label for="n_sim" style="display: block; margin-bottom: 5px;">Num sims:</label>
                      <select id="n_sim" class="custom-select">
                          <option>1</option>
                          <option>10</option>
                          <option>100</option>
                          <option>1E3</option>
                          <option>1E4</option>
                          <option>1E5</option>
                      </select>
                  </div>

                  <!-- Start stage -->
                  <div class="dropdown-container">
                      <label for="start_stage" style="display: block; margin-bottom: 5px;">Start stage:</label>
                      <select id="start_stage" class="custom-select">
                          <option>2-1</option>
                          <option>2-2</option>
                          <option>2-3</option>
                          <option>2-5</option>
                          <option>2-6</option>
                          <option>2-7</option>
                          <option>3-1</option>
                          <option>3-2</option>
                          <option>3-3</option>
                          <option>3-5</option>
                          <option>3-6</option>
                          <option>3-7</option>
                          <option>4-1</option>
                          <option>4-2</option>
                          <option>4-3</option>
                          <option>4-5</option>
                          <option>4-6</option>
                          <option>4-7</option>
                          <option>5-1</option>
                          <option>5-2</option>
                          <option>5-3</option>
                          <option>5-5</option>
                          <option>5-6</option>
                          <option>5-7</option>
                      </select>
                  </div>

                  
              </div>

              <div class="column">
                  Content for column 2
              </div>
              <div class="column">
                  Content for column 3
              </div>
            </div>
            
            <div id="Player Profiles" class="tabcontent">
              <!-- <h3>Settings</h3> -->
              <p>Edit player strength profiles here</p> 
            </div>
            
            <div id="Import/Export" class="tabcontent">
              <!-- <h3>Settings</h3> -->
              <p>Import/Export settings</p> 
            </div>

            <div id="Changelog" class="tabcontent">
              <!-- <h3>Settings</h3> -->
              <p>Changelog here</p> 
            </div>
            
            <div id="About" class="tabcontent">
              <h3>About</h3>
              <p>Github project <a href="https://github.com/terracubist/Tempo-Simmy" target="_blank" rel="noopener noreferrer">here</a></p>
            </div>


            
        </div>
    </section>
    <script defer src="https://cdn.jsdelivr.net/pyodide/v0.29.3/full/pyodide.js"></script>
    <script defer src="source.js"></script>
</body>
